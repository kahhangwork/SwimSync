name: CI

# Runs the backend test suites against a real local Supabase stack on every
# push / PR to main. This is what guards the billing + credit money-path logic.
#
# The frontend-tests job below typechecks (tsc --noEmit) and runs the
# component/unit suites (vitest / jest-expo) for both apps. The typecheck guard
# keeps the baseline green — a new type error fails CI instead of hiding in
# known-broken noise.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v3
        with:
          version: latest

      - name: Install Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      # `supabase start` boots the Docker stack (Postgres/Auth/REST/Storage),
      # applies supabase/migrations/*, and seeds supabase/seed.sql.
      - name: Start Supabase stack
        run: supabase start

      # pgTAP: triggers, RLS isolation, constraints, §11 edge cases.
      - name: DB tests (pgTAP)
        run: supabase test db

      # Deno: generate-invoices billing math + credit ledger. test.sh pulls
      # SERVICE_ROLE_KEY / API_URL from `supabase status`.
      - name: Engine tests (Deno)
        run: supabase/functions/generate-invoices/test.sh

      - name: Stop Supabase stack
        if: always()
        run: supabase stop

  frontend-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [SwimSyncAdmin, SwimSyncApp]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.app }}/package-lock.json

      - name: Install deps
        run: npm ci
        working-directory: ${{ matrix.app }}

      - name: Typecheck (tsc)
        run: npm run typecheck
        working-directory: ${{ matrix.app }}

      - name: Component / unit tests
        run: npm test
        working-directory: ${{ matrix.app }}
